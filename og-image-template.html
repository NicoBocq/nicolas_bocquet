<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;900&family=Space+Grotesk:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1200px;
    height: 630px;
    background: #ffffff;
    font-family: 'Inter', sans-serif;
    color: #000000;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 56px 80px 60px;
    overflow: hidden;
  }

  .name {
    font-size: 190px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.05em;
    line-height: 0.84;
    margin-bottom: 28px;
  }

  .name .firstname { font-weight: 300; display: block; }
  .name .lastname  { font-weight: 900; display: block; }

  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 1px solid #000;
    padding-top: 22px;
  }

  .bottom-left {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .role {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.55;
  }

  .status {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 400;
    opacity: 0.28;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .bottom-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .domain {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    opacity: 0.3;
  }

  .location {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.28;
  }
</style>
</head>
<body>
  <div class="name">
    <span class="firstname">Nicolas</span>
    <span class="lastname">Bocquet</span>
  </div>

  <div class="bottom">
    <div class="bottom-left">
      <div class="role">Product Engineer · TypeScript / React / Node</div>
      <div class="status">Open to opportunities · Remote or Marseille area</div>
    </div>
    <div class="bottom-right">
      <div class="domain">1h12.com</div>
      <div class="location">Marseille, FR</div>
    </div>
  </div>
</body>
</html>
