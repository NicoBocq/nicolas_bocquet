<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;900&family=Space+Grotesk:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1584px;
    height: 396px;
    background: #ffffff;
    font-family: 'Inter', sans-serif;
    color: #000000;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 48px 72px;
    overflow: hidden;
  }

  .role {
    font-size: 108px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.04em;
    line-height: 0.86;
    margin-bottom: 28px;
  }

  .role .line1 { font-weight: 300; display: block; }
  .role .line2 { font-weight: 900; display: block; }

  .domain {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
    opacity: 0.25;
    position: absolute;
    top: 48px;
    right: 72px;
  }

  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 1px solid #000;
    padding-top: 18px;
  }

  .stack {
    display: flex;
    gap: 2rem;
    align-items: baseline;
    padding-left: 280px;
  }

  .stack-item {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.35;
  }

  .stack-item.highlight {
    opacity: 0.6;
    font-weight: 700;
  }

  .location {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.25;
  }
</style>
</head>
<body>
  <div class="domain">1h12.com</div>

  <div class="role">
    <span class="line1">Product</span>
    <span class="line2">Engineer</span>
  </div>

  <div class="bottom">
    <div class="stack">
      <span class="stack-item highlight">TypeScript</span>
      <span class="stack-item">React</span>
      <span class="stack-item">Next.js</span>
      <span class="stack-item">React Native</span>
      <span class="stack-item">Node.js</span>
      <span class="stack-item">PostgreSQL</span>
      <span class="stack-item highlight">CRM · PIM · SaaS</span>
    </div>
    <div class="location">Marseille, FR</div>
  </div>
</body>
</html>
